server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            # Inventory service
            - id: inventory
              uri: http://localhost:8083
              predicates:
                - Path=/v1/vehicles,/v1/vehicles/**

            # Booking service
            - id: booking
              uri: http://localhost:8081
              predicates:
                - Path=/v1/bookings,/v1/bookings/**

            # Identity service
            - id: identity-customers
              uri: http://localhost:8082
              predicates:
                - Path=/v1/customers,/v1/customers/**

            - id: identity-employees
              uri: http://localhost:8082
              predicates:
                - Path=/v1/employees,/v1/employees/**

            - id: identity-auth
              uri: http://localhost:8082
              predicates:
                - Path=/v1/auth,/v1/auth/**

            # API docs routes for Swagger aggregation
            - id: inventory-api-docs
              uri: http://localhost:8083
              predicates:
                - Path=/v3/api-docs/inventory
              filters:
                - SetPath=/v3/api-docs

            - id: booking-api-docs
              uri: http://localhost:8081
              predicates:
                - Path=/v3/api-docs/booking
              filters:
                - SetPath=/v3/api-docs

            - id: identity-api-docs
              uri: http://localhost:8082
              predicates:
                - Path=/v3/api-docs/identity
              filters:
                - SetPath=/v3/api-docs

security:
  service-jwt-secret: "#CAR_RENTAIL_"

springdoc:
  swagger-ui:
    urls:
      - name: inventory
        url: /v3/api-docs/inventory
      - name: booking
        url: /v3/api-docs/booking
      - name: identity
        url: /v3/api-docs/identity
